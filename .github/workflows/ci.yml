name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: '8.1'

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'

      - name: Lint PHP
        run: bash scripts/ci/lint_php.sh

      - name: Lint JavaScript
        run: bash scripts/ci/lint_js.sh

      - name: Verify version metadata
        run: bash scripts/ci/check_versions.sh

      - name: Build package
        run: bash scripts/ci/build_zip.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: anti-spam-for-wordpress-package
          path: dist/anti-spam-for-wordpress.zip
          if-no-files-found: error
