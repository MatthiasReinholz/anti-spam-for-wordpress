name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint PHP
        run: bash scripts/ci/lint_php.sh

      - name: Lint JavaScript
        run: bash scripts/ci/lint_js.sh

      - name: Verify version metadata
        run: bash scripts/ci/check_versions.sh

      - name: Build package
        run: bash scripts/ci/build_zip.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: anti-spam-for-wordpress-package
          path: dist/anti-spam-for-wordpress.zip
          if-no-files-found: error
