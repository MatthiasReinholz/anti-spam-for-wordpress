name: tag-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version in x.y.z format'
        required: true
        type: string
      ref:
        description: 'Git ref to tag after metadata validation'
        required: true
        default: 'main'
        type: string

permissions:
  contents: write

jobs:
  tag:
    name: Tag release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Validate version input
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use x.y.z format." >&2
            exit 1
          fi

      - name: Validate metadata versions
        run: bash scripts/ci/check_versions.sh "${{ inputs.version }}"

      - name: Create annotated tag
        run: git -c tag.gpgsign=false tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"

      - name: Push tag
        run: git push origin "${{ inputs.version }}"
