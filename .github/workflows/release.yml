name: release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: production
    env:
      PLUGIN_SLUG: anti-spam-for-wordpress
      WP_DEPLOY_ENABLED: ${{ vars.WP_DEPLOY_ENABLED }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@bf6b4fbd49ca58e4608c9c89fba0b8d90bd2a39f
        with:
          php-version: '8.1'

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Verify release tag comes from a merged release PR
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          COMMIT_SHA="$(git rev-parse HEAD)"
          bash scripts/ci/check_release_pr.sh "${GITHUB_REPOSITORY}" "${GITHUB_REF_NAME}" "$COMMIT_SHA"

      - name: Validate tag and metadata versions
        run: bash scripts/ci/check_versions.sh "${GITHUB_REF_NAME}"

      - name: Lint PHP
        run: bash scripts/ci/lint_php.sh

      - name: Lint JavaScript
        run: bash scripts/ci/lint_js.sh

      - name: Build package
        run: bash scripts/ci/build_zip.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: anti-spam-for-wordpress-${{ github.ref_name }}
          path: dist/anti-spam-for-wordpress.zip
          if-no-files-found: error

      - name: Install Subversion
        if: ${{ env.WP_DEPLOY_ENABLED != 'false' }}
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Deploy to WordPress.org
        if: ${{ env.WP_DEPLOY_ENABLED != 'false' }}
        uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2
        with:
          generate-zip: false
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SOURCE_DIR: ./
          SLUG: anti-spam-for-wordpress

      - name: Create GitHub release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/anti-spam-for-wordpress.zip
