name: release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: production
    env:
      PLUGIN_SLUG: anti-spam-for-wordpress
      WP_DEPLOY_ENABLED: ${{ vars.WP_DEPLOY_ENABLED }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: '8.1'

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20'

      - name: Verify release tag comes from a merged release PR
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          COMMIT_SHA="$(git rev-parse HEAD)"
          bash scripts/ci/check_release_pr.sh "${GITHUB_REPOSITORY}" "${GITHUB_REF_NAME}" "$COMMIT_SHA"

      - name: Validate tag and metadata versions
        run: bash scripts/ci/check_versions.sh "${GITHUB_REF_NAME}"

      - name: Lint PHP
        run: bash scripts/ci/lint_php.sh

      - name: Lint JavaScript
        run: bash scripts/ci/lint_js.sh

      - name: Build package
        run: bash scripts/ci/build_zip.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: anti-spam-for-wordpress-${{ github.ref_name }}
          path: dist/anti-spam-for-wordpress.zip
          if-no-files-found: error

      - name: Install Subversion
        if: ${{ env.WP_DEPLOY_ENABLED != 'false' }}
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Deploy to WordPress.org
        if: ${{ env.WP_DEPLOY_ENABLED != 'false' }}
        uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2
        with:
          generate-zip: false
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SOURCE_DIR: ./
          SLUG: anti-spam-for-wordpress

      - name: Create GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/anti-spam-for-wordpress.zip
