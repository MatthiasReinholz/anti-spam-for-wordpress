name: release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: production
    env:
      PLUGIN_SLUG: anti-spam-for-wordpress
      WP_DEPLOY_ENABLED: ${{ vars.WP_DEPLOY_ENABLED }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate tag and metadata versions
        run: bash scripts/ci/check_versions.sh "${GITHUB_REF_NAME}"

      - name: Lint PHP
        run: bash scripts/ci/lint_php.sh

      - name: Lint JavaScript
        run: bash scripts/ci/lint_js.sh

      - name: Build package
        run: bash scripts/ci/build_zip.sh

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: anti-spam-for-wordpress-${{ github.ref_name }}
          path: dist/anti-spam-for-wordpress.zip
          if-no-files-found: error

      - name: Install Subversion
        if: ${{ env.WP_DEPLOY_ENABLED != 'false' }}
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Deploy to WordPress.org
        if: ${{ env.WP_DEPLOY_ENABLED != 'false' }}
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: false
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SOURCE_DIR: ./
          SLUG: anti-spam-for-wordpress

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/anti-spam-for-wordpress.zip
